<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DARK ПРИВЕТСТВУЕТ</title>

    <style>
        /* Это и есть тот самый CSS — здесь мы настраиваем красоту */
        body {
            background-color: #f5f5dc; /* Бежевый фон */
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif; /* Красивый шрифт с засечками */
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 60px;
            color: #1a1a1a;
            letter-spacing: 10px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .gold {
            /* Делаем золотой градиент на буквах */
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .line {
            height: 2px;
            width: 80px;
            background-color: #bf953f; /* Золотая полоска */
            margin: 20px auto;
        }

        p {
            font-size: 14px;
            color: #8b8b8b;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DARK <span class="gold">ПРИВЕТСТВУЕТ</span></h1>
        <div class="line"></div>
        <p>Luxury & Style</p>
    </div>

</body>
</html>
