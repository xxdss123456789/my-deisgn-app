<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Studio | Portfolio</title>
    <style>
        /* ОСНОВНОЙ ДИЗАЙН */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; /* Глубокий черный */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* КРАСИВЫЙ ГРАДИЕНТНЫЙ ЗАГОЛОВОК */
        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff8a00, #e52e71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: #888;
            max-width: 600px;
            line-height: 1.6;
        }

        /* КНОПКА ЗАКАЗА */
        .btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: #e52e71;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(229, 46, 113, 0.3);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(229, 46, 113, 0.5);
            background: #ff8a00;
        }

        /* КАРТОЧКИ УСЛУГ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 50px;
            width: 80%;
        }

        .card {
            background: #111;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .card:hover {
            border-color: #ff8a00;
        }

        .card h3 { color: #ff8a00; }
    </style>
</head>
<body>

    <h1>DARK STUDIO</h1>
    <p>Профессиональный монтаж и уникальный дизайн. Твой контент заслуживает быть лучшим.</p>

    <a href="https://t.me" class="btn">ОБСУДИТЬ ПРОЕКТ</a>

    <div class="grid">
        <div class="card">
            <h3>🎬 Монтаж</h3>
            <p>Динамичные Reels и Shorts</p>
        </div>
        <div class="card">
            <h3>🎨 Дизайн</h3>
            <p>Превью, лого и баннеры</p>
        </div>
        <div class="card">
            <h3>🚀 Обучение</h3>
            <p>Курсы по монтажу с нуля</p>
        </div>
    </div>

    <script>
        // Небольшая проверка работоспособности
        console.log("Сайт успешно запущен!");
    </script>
</body>
</html>
