<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK AVIATOR</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; color: #fff; font-family: 'Arial Black', sans-serif; }
        .game-area { position: relative; width: 100%; height: 60vh; background: radial-gradient(circle at bottom left, #2c1a10 0%, #000 70%); border-bottom: 2px solid #bf953f; display: flex; justify-content: center; align-items: center; }
        #plane { position: absolute; bottom: 50px; left: 50px; font-size: 60px; z-index: 10; filter: drop-shadow(0 0 15px #bf953f); transition: transform 0.1s linear; }
        .multiplier { font-size: 100px; font-weight: bold; background: linear-gradient(to bottom, #fff, #bf953f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; z-index: 5; }
        .controls { height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; gap: 20px; }
        .stats { font-size: 24px; color: #bf953f; letter-spacing: 2px; }

        .main-btn {
            width: 300px; height: 80px; font-size: 25px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; border: 2px solid #bf953f; background: #bf953f; color: #000;
            box-shadow: 0 0 30px rgba(191, 149, 63, 0.5); transition: 0.2s;
        }
        .main-btn:active { transform: scale(0.95); background: #fff; }
        .main-btn#cashout-btn { background: #ff4d4d; border-color: #ff4d4d; color: #fff; display: none; }
        .status-msg { height: 30px; color: #ff4d4d; font-size: 18px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="game-area">
        <div id="plane">✈️</div>
        <div class="multiplier" id="x-val">x1.00</div>
    </div>

    <div class="controls">
        <div class="status-msg" id="msg"></div>
        <div class="stats">БАЛАНС: <span id="balance">1000</span> DARK</div>
        <button class="main-btn" id="bet-btn" onclick="startRound()">СТАВКА 100</button>
        <button class="main-btn" id="cashout-btn" onclick="cashOut()">ЗАБРАТЬ</button>
        <div style="color: #444; font-size: 10px;">@DARKAIthe_bot</div>
    </div>

    <script>
        let balance = 1000;
        let x = 1.00;
        let isFlying = false;
        let gameInterval;

        const xText = document.getElementById('x-val');
        const balanceText = document.getElementById('balance');
        const plane = document.getElementById('plane');
        const betBtn = document.getElementById('bet-btn');
        const cashBtn = document.getElementById('cashout-btn');
        const msg = document.getElementById('msg');

        function startRound() {
            if (balance < 100) { msg.innerText = "МАЛО ДЕНЕГ!"; return; }
            isFlying = true;
            x = 1.00;
            balance -= 100;
            balanceText.innerText = balance;
            msg.innerText = "";
            betBtn.style.display = 'none';
            cashBtn.style.display = 'block';

            let crashAt = (Math.random() * 5 + 1.1).toFixed(2);

            gameInterval = setInterval(() => {
                x += 0.01 + (x/80);
                xText.innerText = x${x.toFixed(2)};
                let move = (x - 1) * 60;
                plane.style.transform = translate(${move * 1.2}px, -${move}px);

                if (x >= crashAt) {
                    clearInterval(gameInterval);
                    isFlying = false;
                    msg.innerText = "CRASH! УЛЕТЕЛ!";
                    xText.style.color = "#ff4d4d";
                    setTimeout(resetGame, 2000);
                }
            }, 50);
        }
[09.05.2026 13:04] 𝗗𝗔𝗥𝗞: function cashOut() {
            if (!isFlying) return;
            clearInterval(gameInterval);
            let win = 100 * x;
            balance += win;
            balanceText.innerText = Math.floor(balance);
            msg.innerText = ВЫИГРАЛ: +${Math.floor(win)};
            msg.style.color = "#00ff00";
            isFlying = false;
            setTimeout(resetGame, 2000);
        }

        function resetGame() {
            betBtn.style.display = 'block';
            cashBtn.style.display = 'none';
            xText.style.color = "#fff";
            xText.innerText = "x1.00";
            plane.style.transform = "translate(0,0)";
            msg.style.color = "#ff4d4d";
        }
    </script>
</body>
</html>
