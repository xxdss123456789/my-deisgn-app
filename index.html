<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body { background-color: #111; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        #score { font-size: 60px; color: gold; margin-bottom: 20px; }
        #coin {
            width: 150px; height: 150px; background: gold; border-radius: 50%;
            margin: 0 auto; display: flex; align-items: center; justify-content: center;
            font-size: 60px; cursor: pointer; border: 5px solid orange;
        }
        #coin:active { transform: scale(0.9); }
        button { margin-top: 20px; padding: 10px 20px; font-size: 18px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="score">0</div>
    <div id="coin" onclick="clickAction()">💰</div>
    <br>
    <button onclick="resetAction()">Сбросить прогресс</button>

    <script>
        // Инициализация Telegram
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Загрузка счета
        let score = parseInt(localStorage.getItem('score')) || 0;
        document.getElementById('score').innerText = score;

        // Функция клика
        function clickAction() {
            score = score + 1;
            document.getElementById('score').innerText = score;
            localStorage.setItem('score', score);

            // Вибрация
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        // Функция сброса
        function resetAction() {
            score = 0;
            document.getElementById('score').innerText = score;
            localStorage.setItem('score', 0);
        }
    </script>
</body>
</html>
