<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #score { font-size: 60px; font-weight: bold; margin-bottom: 20px; color: #f3ba2f; }
        .coin { width: 200px; height: 200px; background: #f3ba2f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 80px; cursor: pointer; box-shadow: 0 0 20px #f3ba2f; }
        .coin:active { transform: scale(0.95); }
        .btn { margin-top: 20px; padding: 15px 30px; width: 80%; background: #242424; color: white; border: 1px solid #f3ba2f; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="score">0</div>
    <div class="coin" onclick="handleTap()">💰</div>
    <button class="btn" onclick="handleGamble()">🎰 ИСПЫТАТЬ УДАЧУ</button>
    <button class="btn" onclick="handleReset()">🔄 СБРОСИТЬ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let score = parseInt(localStorage.getItem('score')) || 0;
        document.getElementById('score').innerText = score;

        function handleTap() {
            score++;
            update();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function handleGamble() {
            if (Math.random() > 0.5) {
                score *= 2;
                alert("УДВОЕНО!");
            } else {
                score = 0;
                alert("ПРОИГРЫШ!");
            }
            update();
        }

        function handleReset() {
            score = 0;
            update();
        }

        function update() {
            document.getElementById('score').innerText = score;
            localStorage.setItem('score', score);
        }
    </script>
</body>
</html>
