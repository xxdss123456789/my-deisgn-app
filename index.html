<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DARK AVIATOR TG</title>
    <!-- Подключаем скрипт Телеграма — БЕЗ НЕГО РАБОТАТЬ НЕ БУДЕТ -->
    <script src="https://telegram.org"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; color: #fff; font-family: sans-serif; }
        .game-area { position: relative; width: 100%; height: 60vh; background: radial-gradient(circle at bottom left, #2c1a10 0%, #000 70%); border-bottom: 2px solid #bf953f; display: flex; justify-content: center; align-items: center; }
        #plane { position: absolute; bottom: 40px; left: 20px; font-size: 50px; z-index: 10; filter: drop-shadow(0 0 15px #bf953f); will-change: transform; }
        .multiplier { font-size: 80px; font-weight: bold; color: #bf953f; z-index: 5; }
        .controls { height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; }
        .main-btn {
            width: 80%; height: 70px; font-size: 22px; font-weight: bold; cursor: pointer;
            border: none; background: #bf953f; color: #000; border-radius: 15px;
            text-transform: uppercase; transition: 0.1s;
        }
        .main-btn:active { transform: scale(0.95); opacity: 0.8; }
        #cashout-btn { background: #ff4d4d; color: #fff; display: none; }
        .info { margin-bottom: 15px; color: #bf953f; font-size: 18px; }
    </style>
</head>
<body>

    <div class="game-area">
        <div id="plane">✈️</div>
        <div class="multiplier" id="x-val">x1.00</div>
    </div>

    <div class="controls">
        <div class="info">БАЛАНС: <span id="balance">1000</span> DARK</div>
        <button class="main-btn" id="bet-btn">СТАВКА 100</button>
        <button class="main-btn" id="cashout-btn">ЗАБРАТЬ</button>
        <p id="status" style="color: #ff4d4d; margin-top: 10px; font-size: 12px;"></p>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на всё окно
        tg.ready();

        let balance = 1000;
        let x = 1.00;
        let isFlying = false;
        let gameInterval;

        const xText = document.getElementById('x-val');
        const plane = document.getElementById('plane');
        const betBtn = document.getElementById('bet-btn');
        const cashBtn = document.getElementById('cashout-btn');
        const status = document.getElementById('status');

        // Используем современный способ прослушивания клика
        betBtn.addEventListener('click', () => {
            if (isFlying) return;
            startRound();
        });

        cashBtn.addEventListener('click', () => {
            if (!isFlying) return;
            cashOut();
        });

        function startRound() {
            isFlying = true;
            x = 1.00;
            balance -= 100;
            document.getElementById('balance').innerText = balance;

            status.innerText = "";
            betBtn.style.display = 'none';
            cashBtn.style.display = 'block';

            let crashAt = (Math.random() * 4 + 1.1);

            gameInterval = setInterval(() => {
                x += 0.02;
                xText.innerText = x${x.toFixed(2)};

                let move = (x - 1) * 40;
                plane.style.transform = translate(${move * 1.3}px, -${move}px);

                if (x >= crashAt) {
                    clearInterval(gameInterval);
                    isFlying = false;
                    status.innerText = "CRASH! УЛЕТЕЛ";
                    tg.HapticFeedback.notificationOccurred('error'); // Вибрация при проигрыше
                    setTimeout(reset, 2000);
                }
            }, 60);
        }
[09.05.2026 13:10] 𝗗𝗔𝗥𝗞: function cashOut() {
            clearInterval(gameInterval);
            let win = 100 * x;
            balance += win;
            document.getElementById('balance').innerText = Math.floor(balance);
            status.innerText = "ВЫИГРАЛ: +" + Math.floor(win);
            tg.HapticFeedback.impactOccurred('heavy'); // Вибрация при выигрыше
            isFlying = false;
            setTimeout(reset, 2000);
        }

        function reset() {
            betBtn.style.display = 'block';
            cashBtn.style.display = 'none';
            xText.innerText = "x1.00";
            plane.style.transform = "translate(0,0)";
        }
    </script>
</body>
</html>
