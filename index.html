<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DARK ПРИВЕТСТВУЕТ</title>
    <style>
        body {
            /* Глубокий темный фон с градиентом в стиле твоей картинки */
            background: radial-gradient(circle at center, #2c1a10 0%, #000000 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif; /* Более массивный шрифт */
            color: #ffffff;
            overflow: hidden;
        }

        /* Виньетка (затемнение по краям) для атмосферы */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        .main-card {
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: clamp(40px, 8vw, 80px); /* Размер подстраивается под экран */
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.9;
            color: #fff;
            /* Тень, чтобы текст "выпирал", как на картинке */
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .gold {
            /* Бронзово-золотой металлик */
            background: linear-gradient(to bottom, #fcf6ba 0%, #bf953f 40%, #8b6914 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(191, 149, 63, 0.4));
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn {
            text-decoration: none;
            color: #fcf6ba;
            width: 280px;
            padding: 15px;
            border: 2px solid #bf953f;
            background: rgba(191, 149, 63, 0.05);
            font-size: 18px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 3px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        /* Эффект свечения при наведении */
        .btn:hover {
            background: #bf953f;
            color: #000;
            box-shadow: 0 0 30px rgba(191, 149, 63, 0.6);
            transform: scale(1.05);
        }

        .sub-text {
            margin-top: 30px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            color: #bf953f;
            letter-spacing: 5px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>DARK<br><span class="gold">ПРИВЕТСТВУЕТ</span></h1>

        <div class="buttons">
            <a href="#" class="btn">Клиенты</a>
            <a href="#" class="btn">Обучение</a>
            <a href="#" class="btn">Связаться</a>
        </div>

        <p class="sub-text">PREMIUM QUALITY ONLY</p>
    </div>

</body>
</html>
